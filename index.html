<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Patcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-2xl">
    <h1 class="text-5xl font-bold tracking-tighter text-center mb-8">Hash Patcher</h1>

    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
      <label class="block text-sm font-medium text-zinc-400 mb-2">Input</label>
      <textarea id="input"
                class="w-full h-40 bg-black border border-zinc-800 rounded-xl p-4 text-lg focus:outline-none focus:border-zinc-600 resize-y"
                placeholder="Type or paste text here..."></textarea>

      <div id="meter" class="mt-4">
        <div class="flex justify-between items-baseline text-sm mb-1">
          <span class="text-zinc-400">Password strength</span>
          <span id="strengthLabel" class="font-medium text-zinc-300">—</span>
        </div>
        <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
          <div id="strengthBar" class="h-2 w-0 bg-red-500 transition-all"></div>
        </div>
        <div class="mt-3">
          <div class="text-sm text-zinc-400">Time to crack (fast offline)</div>
          <div id="crackTime" class="text-2xl font-semibold text-white">—</div>
        </div>
      </div>

      <div class="mt-6">
        <label class="block text-sm font-medium text-zinc-400 mb-2">MD5</label>
        <div id="output"
             class="font-mono text-xl bg-black border border-zinc-800 rounded-xl p-4 min-h-[52px] break-all select-all">
        </div>
        <div class="flex gap-2 mt-3">
          <button id="copyBtn"
                  class="flex-1 py-3 rounded-xl bg-green-600 hover:bg-green-500 active:bg-green-700 text-white font-medium transition">
            Copy
          </button>
          <button id="meterBtn"
                  class="flex-1 py-3 rounded-xl bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 text-zinc-300 font-medium transition">
            Meter
          </button>
        </div>
      </div>
    </div>

    <p class="text-center text-zinc-500 text-xs mt-4">Live MD5 hash • updates as you type</p>
  </div>

  <script>
    // Compact MD5 implementation (public domain style)
    function md5(str) {
      function rotateLeft(lValue, iShiftBits) {
        return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
      }
      function addUnsigned(lX, lY) {
        const lX8 = lX & 0x80000000, lY8 = lY & 0x80000000, lX4 = lX & 0x40000000, lY4 = lY & 0x40000000;
        const lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
        if (lX4 & lY4) return lResult ^ 0x80000000 ^ lX8 ^ lY8;
        if (lX4 | lY4) return (lResult & 0x40000000) ? lResult ^ 0xC0000000 ^ lX8 ^ lY8 : lResult ^ 0x40000000 ^ lX8 ^ lY8;
        return lResult ^ lX8 ^ lY8;
      }
      function F(x, y, z) { return (x & y) | ((~x) & z); }
      function G(x, y, z) { return (x & z) | (y & (~z)); }
      function H(x, y, z) { return x ^ y ^ z; }
      function I(x, y, z) { return y ^ (x | (~z)); }
      function FF(a, b, c, d, x, s, ac) { a = addUnsigned(a, addUnsigned(addUnsigned(F(b, c, d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
      function GG(a, b, c, d, x, s, ac) { a = addUnsigned(a, addUnsigned(addUnsigned(G(b, c, d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
      function HH(a, b, c, d, x, s, ac) { a = addUnsigned(a, addUnsigned(addUnsigned(H(b, c, d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
      function II(a, b, c, d, x, s, ac) { a = addUnsigned(a, addUnsigned(addUnsigned(I(b, c, d), x), ac)); return addUnsigned(rotateLeft(a, s), b); }
      function convertToWordArray(str) {
        let lWordCount, lMessageLength = str.length, lNumberOfWords_temp1 = lMessageLength + 8, lNumberOfWords_temp2 = (lNumberOfWords_temp1 - (lNumberOfWords_temp1 % 64)) / 64, lNumberOfWords = (lNumberOfWords_temp2 + 1) * 16;
        let lWordArray = Array(lNumberOfWords - 1), lBytePosition = 0, lByteCount = 0;
        while (lByteCount < lMessageLength) {
          lWordCount = (lByteCount - (lByteCount % 4)) / 4;
          lBytePosition = (lByteCount % 4) * 8;
          lWordArray[lWordCount] = (lWordArray[lWordCount] || 0) | (str.charCodeAt(lByteCount) << lBytePosition);
          lByteCount++;
        }
        lWordCount = (lByteCount - (lByteCount % 4)) / 4;
        lBytePosition = (lByteCount % 4) * 8;
        lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
        lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
        lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
        return lWordArray;
      }
      function wordToHex(lValue) {
        let wordToHexValue = "", wordToHexValue_temp = "", lByte, lCount;
        for (lCount = 0; lCount <= 3; lCount++) {
          lByte = (lValue >>> (lCount * 8)) & 255;
          wordToHexValue_temp = "0" + lByte.toString(16);
          wordToHexValue += wordToHexValue_temp.substr(wordToHexValue_temp.length - 2, 2);
        }
        return wordToHexValue;
      }
      let x = convertToWordArray(str), a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;
      for (let k = 0; k < x.length; k += 16) {
        let AA = a, BB = b, CC = c, DD = d;
        a = FF(a, b, c, d, x[k + 0], 7, 0xD76AA478); d = FF(d, a, b, c, x[k + 1], 12, 0xE8C7B756);
        c = FF(c, d, a, b, x[k + 2], 17, 0x242070DB); b = FF(b, c, d, a, x[k + 3], 22, 0xC1BDCEEE);
        a = FF(a, b, c, d, x[k + 4], 7, 0xF57C0FAF); d = FF(d, a, b, c, x[k + 5], 12, 0x4787C62A);
        c = FF(c, d, a, b, x[k + 6], 17, 0xA8304613); b = FF(b, c, d, a, x[k + 7], 22, 0xFD469501);
        a = FF(a, b, c, d, x[k + 8], 7, 0x698098D8); d = FF(d, a, b, c, x[k + 9], 12, 0x8B44F7AF);
        c = FF(c, d, a, b, x[k + 10], 17, 0xFFFF5BB1); b = FF(b, c, d, a, x[k + 11], 22, 0x895CD7BE);
        a = FF(a, b, c, d, x[k + 12], 7, 0x6B901122); d = FF(d, a, b, c, x[k + 13], 12, 0xFD987193);
        c = FF(c, d, a, b, x[k + 14], 17, 0xA679438E); b = FF(b, c, d, a, x[k + 15], 22, 0x49B40821);
        a = GG(a, b, c, d, x[k + 1], 5, 0xF61E2562); d = GG(d, a, b, c, x[k + 6], 9, 0xC040B340);
        c = GG(c, d, a, b, x[k + 11], 14, 0x265E5A51); b = GG(b, c, d, a, x[k + 0], 20, 0xE9B6C7AA);
        a = GG(a, b, c, d, x[k + 5], 5, 0xD62F105D); d = GG(d, a, b, c, x[k + 10], 9, 0x02441453);
        c = GG(c, d, a, b, x[k + 15], 14, 0xD8A1E681); b = GG(b, c, d, a, x[k + 4], 20, 0xE7D3FBC8);
        a = GG(a, b, c, d, x[k + 9], 5, 0x21E1CDE6); d = GG(d, a, b, c, x[k + 14], 9, 0xC33707D6);
        c = GG(c, d, a, b, x[k + 3], 14, 0xF4D50D87); b = GG(b, c, d, a, x[k + 8], 20, 0x455A14ED);
        a = GG(a, b, c, d, x[k + 13], 5, 0xA9E3E905); d = GG(d, a, b, c, x[k + 2], 9, 0xFCEFA3F8);
        c = GG(c, d, a, b, x[k + 7], 14, 0x676F02D9); b = GG(b, c, d, a, x[k + 12], 20, 0x8D2A4C8A);
        a = HH(a, b, c, d, x[k + 5], 4, 0xFFFA3942); d = HH(d, a, b, c, x[k + 8], 11, 0x8771F681);
        c = HH(c, d, a, b, x[k + 11], 16, 0x6D9D6122); b = HH(b, c, d, a, x[k + 14], 23, 0xFDE5380C);
        a = HH(a, b, c, d, x[k + 1], 4, 0xA4BEEA44); d = HH(d, a, b, c, x[k + 4], 11, 0x4BDECFA9);
        c = HH(c, d, a, b, x[k + 7], 16, 0xF6BB4B60); b = HH(b, c, d, a, x[k + 10], 23, 0xBEBFBC70);
        a = HH(a, b, c, d, x[k + 13], 4, 0x289B7EC6); d = HH(d, a, b, c, x[k + 0], 11, 0xEAA127FA);
        c = HH(c, d, a, b, x[k + 3], 16, 0xD4EF3085); b = HH(b, c, d, a, x[k + 6], 23, 0x04881D05);
        a = HH(a, b, c, d, x[k + 9], 4, 0xD9D4D039); d = HH(d, a, b, c, x[k + 12], 11, 0xE6DB99E5);
        c = HH(c, d, a, b, x[k + 15], 16, 0x1FA27CF8); b = HH(b, c, d, a, x[k + 2], 23, 0xC4AC5665);
        a = II(a, b, c, d, x[k + 0], 6, 0xF4292244); d = II(d, a, b, c, x[k + 7], 10, 0x432AFF97);
        c = II(c, d, a, b, x[k + 14], 15, 0xAB9423A7); b = II(b, c, d, a, x[k + 5], 21, 0xFC93A039);
        a = II(a, b, c, d, x[k + 12], 6, 0x655B59C3); d = II(d, a, b, c, x[k + 3], 10, 0x8F0CCC92);
        c = II(c, d, a, b, x[k + 10], 15, 0xFFEFF47D); b = II(b, c, d, a, x[k + 1], 21, 0x85845DD1);
        a = II(a, b, c, d, x[k + 8], 6, 0x6FA87E4F); d = II(d, a, b, c, x[k + 15], 10, 0xFE2CE6E0);
        c = II(c, d, a, b, x[k + 6], 15, 0xA3014314); b = II(b, c, d, a, x[k + 13], 21, 0x4E0811A1);
        a = II(a, b, c, d, x[k + 4], 6, 0xF7537E82); d = II(d, a, b, c, x[k + 11], 10, 0xBD3AF235);
        c = II(c, d, a, b, x[k + 2], 15, 0x2AD7D2BB); b = II(b, c, d, a, x[k + 9], 21, 0xEB86D391);
        a = addUnsigned(a, AA); b = addUnsigned(b, BB); c = addUnsigned(c, CC); d = addUnsigned(d, DD);
      }
      return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
    }

    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const copyBtn = document.getElementById('copyBtn');
    const meterBtn = document.getElementById('meterBtn');
    const meter = document.getElementById('meter');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');
    const crackTime = document.getElementById('crackTime');

    const labels = ['Very weak', 'Weak', 'Fair', 'Good', 'Strong'];

    function formatTime(sec) {
      if (!sec || sec < 1) return 'less than a second';
      if (sec < 60) return Math.round(sec) + ' seconds';
      if (sec < 3600) { const m = Math.round(sec / 60); return m + ' minute' + (m === 1 ? '' : 's'); }
      if (sec < 86400) { const h = Math.round(sec / 3600); return h + ' hour' + (h === 1 ? '' : 's'); }
      if (sec < 2592000) { const d = Math.round(sec / 86400); return d + ' day' + (d === 1 ? '' : 's'); }
      if (sec < 31536000) { const mo = Math.round(sec / 2592000); return mo + ' month' + (mo === 1 ? '' : 's'); }
      if (sec < 315360000) { const y = Math.round(sec / 31536000); return y + ' year' + (y === 1 ? '' : 's'); }
      if (sec < 3153600000) { const de = Math.round(sec / 315360000); return de + ' decade' + (de === 1 ? '' : 's'); }
      return 'centuries';
    }

    function updateStrength(pwd) {
      if (!pwd) {
        strengthBar.style.width = '0%';
        strengthBar.className = 'h-2 w-0 bg-red-500 transition-all';
        strengthLabel.textContent = '—';
        crackTime.textContent = '—';
        return;
      }
      try {
        const r = zxcvbn(pwd);
        const s = r.score;
        const pct = ((s + 1) / 5) * 100;
        const colors = ['bg-red-500','bg-orange-500','bg-yellow-500','bg-emerald-500','bg-green-600'];
        strengthBar.style.width = pct + '%';
        strengthBar.className = 'h-2 transition-all ' + colors[s];
        strengthLabel.textContent = labels[s];
        const sec = r.crack_times_seconds.offline_fast_hashing_1e10_per_second;
        crackTime.textContent = formatTime(sec);
      } catch (e) {
        strengthLabel.textContent = '—';
        crackTime.textContent = 'zxcvbn not loaded';
      }
    }

    function updateHash() {
      const val = input.value;
      output.textContent = val ? md5(val) : '';
      updateStrength(val);
    }

    input.addEventListener('input', updateHash);

    copyBtn.addEventListener('click', async () => {
      const text = output.textContent;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        const orig = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = orig, 1200);
      } catch (e) {
        const range = document.createRange();
        range.selectNode(output);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
      }
    });

    updateHash();

    meterBtn.addEventListener('click', () => {
      meter.classList.toggle('hidden');
    });
  </script>
</body>
</html>
