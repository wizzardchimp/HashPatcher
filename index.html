        const lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);

      if (sec < 60) return Math.round(sec) + ' seconds';
      if (sec < 3600) { const m = Math.round(sec / 60); return m + ' minute' + (m === 1 ? '' : 's'); }
      if (sec < 86400) { const h = Math.round(sec / 3600); return h + ' hour' + (h === 1 ? '' : 's'); }
      if (sec < 2592000) { const d = Math.round(sec / 86400); return d + ' day' + (d === 1 ? '' : 's'); }
      if (sec < 31536000) { const mo = Math.round(sec / 2592000); return mo + ' month' + (mo === 1 ? '' : 's'); }
      if (sec < 315360000) { const y = Math.round(sec / 31536000); return y + ' year' + (y === 1 ? '' : 's'); }
      if (sec < 3153600000) { const de = Math.round(sec / 315360000); return de + ' decade' + (de === 1 ? '' : 's'); }
      return 'centuries';
    }

    function updateStrength(pwd) {
      if (!pwd) {
        strengthBar.style.width = '0%';
        strengthBar.className = 'h-2 w-0 bg-red-500 transition-all';
        strengthLabel.textContent = '—';
        crackTime.textContent = '—';
        return;
      }
      try {
        const r = zxcvbn(pwd);
        const s = r.score;
        const pct = ((s + 1) / 5) * 100;
        const colors = ['bg-red-500','bg-orange-500','bg-yellow-500','bg-emerald-500','bg-green-600'];
        strengthBar.style.width = pct + '%';
        strengthBar.className = 'h-2 transition-all ' + colors[s];
        strengthLabel.textContent = labels[s];
        const sec = r.crack_times_seconds.offline_fast_hashing_1e10_per_second;
        crackTime.textContent = formatTime(sec);
      } catch (e) {
        strengthLabel.textContent = '—';
        crackTime.textContent = 'zxcvbn not loaded';
      }
    }

    function updateHash() {
      const val = input.value;
      output.textContent = val ? md5(val) : '';
      updateStrength(val);
    }

    input.addEventListener('input', updateHash);

    copyBtn.addEventListener('click', async () => {
      const text = output.textContent;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        const orig = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = orig, 1200);
      } catch (e) {
        const range = document.createRange();
        range.selectNode(output);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
      }
    });

    meterBtn.addEventListener('click', () => {
      meter.classList.toggle('hidden');
    });

    let crackRunning = false;
    let crackAbort = false;

    function timestamp() {
      const d = new Date();
      return d.toTimeString().slice(0, 8);
    }

    function addLine(html) {
      const div = document.createElement('div');
      div.innerHTML = '<span class="text-zinc-600">[' + timestamp() + ']</span> ' + html;
      terminal.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;
      return div;
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function runCrack() {
      const hash = output.textContent;
      if (!hash) {
        addLine('<span class="text-yellow-500">No hash to crack. Type something first.</span>');
        return;
      }

      crackRunning = true;
      crackAbort = false;
      terminal.innerHTML = '';
      panelStatus.textContent = 'RUNNING';

      addLine('<span class="text-zinc-400">Target: <span class="text-white">' + hash + '</span></span>');
      addLine('<span class="text-zinc-400">Method: Rainbow table (MD5 precomputed lookup)</span>');
      addLine('<span class="text-zinc-400">Database: ' + COMMON_PASSWORDS.length + ' common password hashes loaded</span>');
      addLine('<span class="text-zinc-500">─────────────────────────────────────────</span>');
      await sleep(300);

      let found = false;
      let foundPw = null;
      let checked = 0;
      const shuffled = [...COMMON_PASSWORDS].sort(() => Math.random() - 0.5);

      for (const pw of shuffled) {
        if (crackAbort) break;

        const pwHash = md5(pw);
        checked++;

        if (pwHash === hash) {
          found = true;
          foundPw = pw;
          break;
        }

        if (checked % 3 === 0) {
          addLine('<span class="text-zinc-600">Scanning... hash_prefix=<span class="text-zinc-400">' + pwHash.slice(0, 8) + '</span> (' + checked + '/' + COMMON_PASSWORDS.length + ')</span>');
          await sleep(80 + Math.random() * 120);
        }
      }

      addLine('<span class="text-zinc-500">─────────────────────────────────────────</span>');
      await sleep(200);

      if (found) {
        addLine('<span class="text-green-400 font-bold">[+] MATCH FOUND!</span>');
        addLine('<span class="text-green-300">    Password : <span class="text-white font-bold">"' + foundPw + '"</span></span>');
        addLine('<span class="text-green-300">    Hash     : ' + hash + '</span>');
        addLine('<span class="text-green-300">    Lookup   : ' + checked + ' entries scanned</span>');
        panelStatus.textContent = 'CRACKED';
        panelStatus.className = 'text-xs text-green-500 font-mono';
      } else {
        addLine('<span class="text-red-400 font-bold">[-] NO TRACE</span>');
        addLine('<span class="text-red-300/70">    Hash not found in rainbow table.</span>');
        addLine('<span class="text-zinc-500">    ' + checked + '/' + COMMON_PASSWORDS.length + ' entries scanned — no match.</span>');
        addLine('<span class="text-zinc-600">    This hash may use a strong/unique password.</span>');
        panelStatus.textContent = 'NO MATCH';
        panelStatus.className = 'text-xs text-red-500 font-mono';
      }

      crackRunning = false;
    }

    crackBtn.addEventListener('click', () => {
      if (crackPanel.classList.contains('w-0') || crackPanel.style.opacity === '0') {
        app.style.maxWidth = '30rem';
        crackPanel.style.width = '450px';
        crackPanel.style.opacity = '1';
        crackPanel.style.marginLeft = '1rem';
        crackBtn.textContent = 'Close';
        crackBtn.className = 'flex-1 py-3 rounded-xl bg-zinc-700 hover:bg-zinc-600 active:bg-zinc-500 text-zinc-300 font-medium transition';
        panelTitle.textContent = 'rainbow_table_lookup';
        panelStatus.className = 'text-xs text-zinc-600 font-mono';
        panelStatus.textContent = '';
        setTimeout(() => runCrack(), 500);
      } else {
        crackAbort = true;
        crackPanel.style.width = '0';
        crackPanel.style.opacity = '0';
        crackPanel.style.marginLeft = '0';
        app.style.maxWidth = '42rem';
        crackBtn.textContent = 'Crack';
        crackBtn.className = 'flex-1 py-3 rounded-xl bg-red-700 hover:bg-red-600 active:bg-red-800 text-white font-medium transition';
      }
    });

    updateHash();
  </script>
</body>
</html>
